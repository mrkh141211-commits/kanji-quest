<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漢字クエスト</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Kaku Gothic ProN','Meiryo',sans-serif; background: #eef3fb; min-height: 100vh; }

  /* HERO */
  .hero { position: relative; overflow: hidden; border-bottom: 4px solid #c8860a; }
  .hero-img { width: 100%; height: 220px; object-fit: cover; display: block; transition: opacity .3s; }
  .hero-overlay { position: absolute; inset: 0; background: linear-gradient(180deg,rgba(10,20,50,.15) 0%,rgba(10,20,50,.05) 40%,rgba(10,20,50,.4) 100%); pointer-events:none; }
  .title-plate { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index:5; text-align:center; padding:14px 36px; }
  .title-plate::before { content:none; }
  .title-plate h1 {
    font-family:'Noto Serif JP',serif; font-size:3.8rem; font-weight:900; letter-spacing:2px; white-space:nowrap;
    background:linear-gradient(180deg,#fff6c8 0%,#ffd34d 35%,#c8860a 55%,#ffd34d 75%,#8a5a00 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(2px 3px 0 #1a1030) drop-shadow(-1px -1px 0 #1a1030) drop-shadow(0 0 16px rgba(255,200,80,.7));
  }
  .title-plate .hero-sub { margin-top:6px; font-size:12px; letter-spacing:4px; color:#fff6d8; text-shadow:1px 1px 3px #1a1030; }

  /* 画像アップロードボタン（右下に重ねる） */
  .hero-upload-btn {
    position: absolute; bottom: 10px; right: 12px; z-index: 10;
    background: rgba(0,0,0,.45); color: #fff; border: 1px solid rgba(255,255,255,.4);
    border-radius: 20px; padding: 5px 12px; font-size: 12px; cursor: pointer;
    backdrop-filter: blur(4px); transition: background .2s;
  }
  .hero-upload-btn:hover { background: rgba(0,0,0,.65); }
  #heroFileInput { display: none; }

  /* タブ */
  .tab-bar { display:flex; background:#fff; border-bottom:2px solid #4a78c8; }
  .tab-btn { flex:1; padding:12px; font-size:15px; font-weight:700; border:none; background:transparent; cursor:pointer; color:#5070a0; border-bottom:3px solid transparent; transition:all .15s; font-family:inherit; }
  .tab-btn.active { color:#1a3a8a; border-bottom-color:#1a3a8a; background:#f0f5ff; }
  .tab-btn:hover:not(.active) { background:#f8f9ff; }

  /* ツールバー */
  .topbar { background:#fff; border-bottom:1px solid #c8d8f0; padding:8px 14px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .btn { border:1px solid transparent; border-radius:4px; padding:6px 16px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; transition:all .15s; }
  .btn:active { transform:scale(.97); }
  .btn-danger { background:linear-gradient(135deg,#c0392b,#9b1a1a); color:#fff; border-color:#e05c5c; }
  .btn-danger:hover { background:linear-gradient(135deg,#d44,#a02020); }
  .btn-primary { background:linear-gradient(135deg,#1a4aaa,#2a6adc); color:#fff; border-color:#4a90d9; }
  .btn-primary:hover { background:linear-gradient(135deg,#2a5acc,#3a7aee); }
  .save-indicator { font-size:12px; color:#4a6090; margin-left:auto; font-weight:700; }
  .save-indicator.saved  { color:#1a9a4a; }
  .save-indicator.saving { color:#c0780a; }
  .save-indicator.error  { color:#d4321f; }

  /* タブコンテンツ */
  .tab-content { display:none; }
  .tab-content.active { display:block; }

  /* 名簿タブ */
  .roster-area { padding:16px; max-width:500px; }
  .roster-area h2 { font-size:15px; color:#1a3a8a; margin-bottom:6px; font-family:'Noto Serif JP',serif; }
  .roster-hint { font-size:12px; color:#5070a0; margin-bottom:12px; background:#f0f5ff; border:1px solid #c8d8f0; border-radius:6px; padding:8px 10px; line-height:1.6; }
  .roster-hint code { background:#dde8f8; border-radius:3px; padding:1px 4px; font-size:11px; }
  .roster-grid { display:grid; grid-template-columns:36px 1fr; gap:6px 8px; align-items:center; }
  .roster-num { font-size:13px; color:#5070b0; font-weight:700; text-align:right; }
  .roster-input { border:1px solid #c8d8f0; border-radius:4px; padding:6px 8px; font-size:14px; font-family:inherit; width:100%; }
  .roster-input:focus { outline:none; border-color:#4a78c8; background:#f0f5ff; }

  /* 集計タブ */
  .table-area { padding:14px; overflow-x:auto; }
  table { border-collapse:collapse; font-size:13px; background:#fff; border:2px solid #4a78c8; border-radius:6px; overflow:hidden; box-shadow:0 4px 24px rgba(60,100,200,.18); }
  thead tr { background:linear-gradient(135deg,#1a3a8a,#2a5ac0); }
  thead th { padding:9px 8px; color:#fff; font-weight:700; border:1px solid #1a3a8a; white-space:nowrap; text-align:center; font-family:'Noto Serif JP',serif; font-size:12px; }
  thead th.name-th { text-align:left; min-width:150px; width:155px; }
  thead th.total-th { min-width:170px; }
  thead th.avg-th { min-width:72px; }
  .avg-row td { background:#eaf1ff !important; border-top:2px solid #4a78c8; }
  .avg-row .avg-label { font-weight:700; color:#1a3a8a; font-size:12px; padding:6px 8px; text-align:left; }
  .avg-row .avg-val { font-weight:700; color:#1a4aaa; font-size:13px; padding:6px 4px; }
  tbody tr { border-bottom:1px solid #d8e4f8; }
  tbody tr:not(.avg-row):nth-child(even) { background:#f4f8ff; }
  tbody tr:not(.avg-row):hover { background:#e6f0ff; }
  td { border:1px solid #d0e0f8; text-align:center; padding:0; vertical-align:middle; }
  td.name-td { text-align:left; padding:0; }
  .name-wrap { display:flex; align-items:center; padding:0 6px; gap:4px; }
  .row-num { font-size:11px; color:#5070b0; font-weight:700; min-width:22px; text-align:right; flex-shrink:0; }
  .name-label { font-size:14px; font-weight:700; color:#16284f; padding:7px 4px; }
  .name-label.empty { color:#b0c0d8; }
  .score-input { border:none; background:transparent; width:100%; text-align:center; font-size:17px; color:#16284f; padding:7px 4px; display:block; font-weight:700; }
  .score-input:focus { outline:none; background:#eaf1ff; }
  .score-input.warn { color:#d4321f !important; font-weight:900; }
  td.result-td { padding:5px 10px; white-space:nowrap; min-width:170px; }
  .result-pts { font-size:21px; font-weight:900; color:#c0780a; font-family:'Noto Serif JP',serif; letter-spacing:1px; line-height:1.1; }
  .result-lv { color:#2a5ac0; font-size:13px; margin-top:3px; font-weight:700; }
  .stars-wrap { display:flex; justify-content:center; gap:2px; margin-top:4px; }
  .star { font-size:14px; cursor:pointer; color:#c8d8f0; transition:color .12s,transform .1s; user-select:none; line-height:1; }
  .star.lit { color:#f0a800; text-shadow:0 0 6px rgba(240,168,0,.5); }
  .star:hover { transform:scale(1.35); }
  .date-input { border:none; background:transparent; font-size:12px; font-weight:700; color:#fff; width:68px; text-align:center; padding:2px; font-family:'Noto Serif JP',serif; }
  .date-input:focus { outline:none; background:rgba(255,255,255,.2); border-radius:3px; }
  td .pavg { font-size:13px; color:#2a5ac0; font-weight:700; padding:6px 4px; }

  /* モーダル */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; align-items:center; justify-content:center; }
  .modal-overlay.active { display:flex; }
  .modal { background:#fff; border:2px solid #4a78c8; border-radius:10px; padding:28px 32px; min-width:280px; box-shadow:0 8px 32px rgba(40,80,180,.25); text-align:center; }
  .modal p { font-size:14px; color:#16284f; margin-bottom:6px; font-family:'Noto Serif JP',serif; }
  .modal .modal-sub { font-size:12px; color:#d4321f; margin-bottom:20px; }
  .modal-btns { display:flex; gap:12px; justify-content:center; }
  .btn-ok { background:linear-gradient(135deg,#1a4aaa,#2a6adc); color:#fff; border-color:#4a90d9; }
  .btn-cancel { background:#e0e0e0; color:#444; border-color:#ccc; }
  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-track { background:#e4ecf8; }
  ::-webkit-scrollbar-thumb { background:#4a78c8; border-radius:4px; }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <img class="hero-img" id="heroImg" src="hero.png" alt="バナー画像"
    onerror="this.src='';this.style.background='linear-gradient(135deg,#1a3a7a,#2a5ac0)';this.style.height='220px'">
  <div class="hero-overlay"></div>
  <div class="title-plate">
    <h1>漢字クエスト</h1>
    
  </div>
  <label class="hero-upload-btn" for="heroFileInput">🖼 バナー画像を変更</label>
  <input type="file" id="heroFileInput" accept="image/*">
</div>

<!-- タブバー -->
<div class="tab-bar">
  <button class="tab-btn" id="tabBtnRoster" >📋 名簿入力</button>
  <button class="tab-btn active" id="tabBtnScore" >📊 集計表</button>
</div>

<!-- ツールバー -->
<div class="topbar">
  <button class="btn btn-danger" data-action="resetName">名前リセット</button>
  <button class="btn btn-danger" data-action="resetScore">得点リセット</button>
  <span style="font-size:12px;color:#4a6090;">⚠ 50点以下は赤字で警告</span>
  <span class="save-indicator" id="saveIndicator">読み込み中…</span>
</div>

<!-- 名簿タブ -->
<div class="tab-content" id="tabRoster">
  <div class="roster-area">
    <h2>📋 名簿入力（40人分）</h2>
    <p style="font-size:13px;color:#5070a0;margin-bottom:10px;">Excelから名前の列をコピーしてそのまま貼り付けてください</p>
    <textarea id="rosterTextarea" placeholder="山田 太郎&#10;田中 花子&#10;佐藤 一郎&#10;…" style="width:100%;height:320px;font-size:14px;font-family:inherit;border:1px solid #c8d8f0;border-radius:6px;padding:10px;resize:vertical;line-height:1.8;"></textarea>
    <br><br>
    <button class="btn btn-primary" data-action="applyRoster">✔ 集計表に反映する</button>
  </div>
</div>

<!-- 集計タブ -->
<div class="tab-content active" id="tabScore">
  <div class="table-area">
    <table id="mainTable">
      <thead><tr id="headerRow"></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- モーダル -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <p id="modalMsg"></p>
    <p class="modal-sub" id="modalSub"></p>
    <div class="modal-btns">
      <button class="btn btn-ok" data-action="doReset">OK</button>
      <button class="btn btn-cancel" data-action="closeModal">キャンセル</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzKQS778ZclsWFixdCDENM3DHx2DjVsPE",
  authDomain: "seichou-note.firebaseapp.com",
  databaseURL: "https://seichou-note-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "seichou-note",
  storageBucket: "seichou-note.firebasestorage.app",
  messagingSenderId: "449292901706",
  appId: "1:449292901706:web:9d191612e4ba4f4cd235b3"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const dataRef = ref(db, 'kanjiQuest/data');

const ROWS=40, MAX_STARS=5, MAX_SCORE=9999, WARN=50;
let names=Array(ROWS).fill(''), cols=['テスト1'], scores=Array(ROWS).fill(null).map(()=>['']), starsData=Array(ROWS).fill(0);
let isLoaded=false, saveTimer=null;

function normalize(){
  while(names.length<ROWS) names.push('');
  while(starsData.length<ROWS) starsData.push(0);
  while(scores.length<ROWS) scores.push(Array(cols.length).fill(''));
  scores.forEach(row=>{while(row.length<cols.length)row.push('');});
}

function setIndicator(state){
  const el=document.getElementById('saveIndicator');
  el.className='save-indicator'+(state==='saved'?' saved':state==='saving'?' saving':state==='error'?' error':'');
  el.textContent={loading:'読み込み中…',saving:'保存中…',saved:'✔ クラウドに保存済み（全端末で共有）',error:'⚠ 保存に失敗しました'}[state]||'';
}

// バナー画像の変更（localStorageに保存）
const heroImg = document.getElementById('heroImg');
const heroFileInput = document.getElementById('heroFileInput');
const HERO_KEY = 'kq_hero_image';

// 保存済みの画像があれば復元
const savedHero = localStorage.getItem(HERO_KEY);
if(savedHero) heroImg.src = savedHero;

heroFileInput.addEventListener('change', e=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    heroImg.src = ev.target.result;
    try { localStorage.setItem(HERO_KEY, ev.target.result); } catch(err) { console.warn('画像の保存に失敗しました（ファイルサイズが大きい可能性があります）'); }
  };
  reader.readAsDataURL(file);
});

// Firebase リアルタイム同期
onValue(dataRef, snap=>{
  const d=snap.val();
  if(d){ names=d.names||Array(ROWS).fill(''); cols=d.cols||['テスト1']; scores=d.scores||Array(ROWS).fill(null).map(()=>['']); starsData=d.stars||Array(ROWS).fill(0); }
  normalize(); isLoaded=true; setIndicator('saved');
  renderRoster(); renderScore();
}, err=>{ console.error('Firebase読み込みエラー:',err); setIndicator('error'); });

function save(){
  if(!isLoaded) return;
  setIndicator('saving');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    set(dataRef,{names,cols,scores,stars:starsData})
      .then(()=>setIndicator('saved'))
      .catch(e=>{console.error('保存エラー:',e);setIndicator('error');});
  },400);
}

// タブ切り替え
function switchTab(tab){
  ['roster','score'].forEach(t=>{
    document.getElementById('tabBtn'+t[0].toUpperCase()+t.slice(1)).classList.toggle('active',t===tab);
    document.getElementById('tab'+t[0].toUpperCase()+t.slice(1)).classList.toggle('active',t===tab);
  });
}

// ===== 名簿タブ =====
function renderRoster(){
  const ta = document.getElementById('rosterTextarea');
  if(ta) ta.value = names.filter((_,i)=>i<ROWS).join('\n').trimEnd();
}

function applyRoster(){
  const ta = document.getElementById('rosterTextarea');
  const lines = ta.value.split(/\r?\n/).map(line=>line.split('\t')[0].trim());
  for(let i=0;i<ROWS;i++) names[i] = lines[i]||'';
  save(); renderScore(); switchTab('score');
}

// ===== 集計タブ =====
function getLevel(t){return Math.floor(t/100)+1;}
function colAvg(ci){const v=scores.map(r=>r[ci]).filter(x=>x!=='').map(Number);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;}
function studentAvg(ri){const v=scores[ri].filter(x=>x!=='').map(Number);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;}
function classOverallAvg(){const a=[];scores.forEach(r=>r.forEach(v=>{if(v!=='')a.push(Number(v));}));return a.length?a.reduce((x,y)=>x+y,0)/a.length:null;}
function warnCount(){let n=0;scores.forEach(r=>r.forEach(v=>{if(v!==''&&Number(v)<=WARN)n++;}));return n;}
function studentCount(){return scores.filter(r=>r.some(v=>v!=='')).length;}

// autoAddColはscoreセル内でインライン処理に変更

function focusCell(ri,ci){
  if(ri>=ROWS) return;
  const el=document.getElementById(`c_${ri}_${ci}`);
  if(el){el.focus();try{el.select();}catch(e){}}
}

function renderScore(){
  const hr=document.getElementById('headerRow'), tb=document.getElementById('tbody');
  hr.innerHTML='';
  const thN=document.createElement('th'); thN.className='name-th'; thN.textContent='生徒名'; hr.appendChild(thN);
  cols.forEach((c,ci)=>{
    const th=document.createElement('th');
    const inp=document.createElement('input'); inp.className='date-input'; inp.value=c;
    inp.addEventListener('change',()=>{cols[ci]=inp.value||cols[ci];save();});
    th.appendChild(inp); hr.appendChild(th);
  });
  const thA=document.createElement('th'); thA.className='avg-th'; thA.textContent='個人平均'; hr.appendChild(thA);
  const thT=document.createElement('th'); thT.className='total-th'; thT.textContent='合計／レベル／評価'; hr.appendChild(thT);

  tb.innerHTML='';
  for(let ri=0;ri<ROWS;ri++){
    const tr=document.createElement('tr');
    const tdN=document.createElement('td'); tdN.className='name-td';
    const wrap=document.createElement('div'); wrap.className='name-wrap';
    const num=document.createElement('span'); num.className='row-num'; num.textContent=(ri+1)+'.';
    const lbl=document.createElement('span'); lbl.className='name-label'+(names[ri]?'':' empty');
    lbl.textContent=names[ri]||'（未入力）';
    wrap.appendChild(num); wrap.appendChild(lbl); tdN.appendChild(wrap); tr.appendChild(tdN);

    let total=0;
    cols.forEach((c,ci)=>{
      const td=document.createElement('td');
      const inp=document.createElement('input'); inp.className='score-input'; inp.type='number'; inp.min=0; inp.max=MAX_SCORE;
      inp.value=scores[ri][ci]; inp.id=`c_${ri}_${ci+1}`;
      if(scores[ri][ci]!==''&&Number(scores[ri][ci])<=WARN) inp.classList.add('warn');
      // 値を確定して保存する共通処理
      function commitScore(){
        const raw=inp.value.trim();
        scores[ri][ci]=raw===''?'':Math.min(MAX_SCORE,Math.max(0,parseInt(raw)||0));
        if(scores[ri][ci]!=='') inp.value=scores[ri][ci];
        inp.classList.toggle('warn',scores[ri][ci]!==''&&Number(scores[ri][ci])<=WARN);
        save(); updateResultRow(ri); refreshAvgRow();
        // 最後の列に入力があれば新列追加（renderScoreを呼ぶのでここだけ）
        const last=cols.length-1;
        if(ci===last && scores[ri][ci]!==''){
          cols.push('テスト'+(cols.length+1));
          scores.forEach(r=>r.push(''));
          save(); renderScore();
        }
      }
      inp.addEventListener('change', commitScore);
      inp.addEventListener('keydown',e=>{
        if(e.key==='Enter'){
          e.preventDefault();
          commitScore();
          // renderScoreが走った場合でも次セルにフォーカス
          setTimeout(()=>focusCell(ri+1,ci+1), 30);
        }
      });
      td.appendChild(inp); tr.appendChild(td);
      const n=parseInt(scores[ri][ci]); if(!isNaN(n)) total+=n;
    });

    const tdP=document.createElement('td'); tdP.id=`pa_${ri}`;
    const pDiv=document.createElement('div'); pDiv.className='pavg';
    const pa=studentAvg(ri); pDiv.textContent=pa!==null?pa.toFixed(1):'—';
    tdP.appendChild(pDiv); tr.appendChild(tdP);

    const tdR=document.createElement('td'); tdR.className='result-td'; tdR.id=`res_${ri}`;
    const hasAny=scores[ri].some(v=>v!=='');
    const pts=document.createElement('div'); pts.className='result-pts'; pts.id=`pts_${ri}`; pts.textContent=hasAny?`${total}点`:'';
    const lv=document.createElement('div'); lv.className='result-lv'; lv.id=`lv_${ri}`; lv.textContent=hasAny?`Lv ${getLevel(total)}`:'';
    const sw=document.createElement('div'); sw.className='stars-wrap';
    for(let s=1;s<=MAX_STARS;s++){
      const sp=document.createElement('span'); sp.className='star'+(starsData[ri]>=s?' lit':''); sp.textContent='★';
      sp.addEventListener('click',()=>{starsData[ri]=starsData[ri]===s?s-1:s;save();updateStars(ri);});
      sw.appendChild(sp);
    }
    tdR.appendChild(pts); tdR.appendChild(lv); tdR.appendChild(sw); tr.appendChild(tdR);
    tb.appendChild(tr);
  }
  appendAvgRow(tb);
}

function appendAvgRow(tb){
  const tr=document.createElement('tr'); tr.className='avg-row';
  const lbl=document.createElement('td'); lbl.className='avg-label'; lbl.textContent='📊 テスト平均'; tr.appendChild(lbl);
  cols.forEach((c,ci)=>{
    const td=document.createElement('td'); td.className='avg-val'; td.id=`ca_${ci}`;
    const avg=colAvg(ci); td.textContent=avg!==null?avg.toFixed(1)+'点':'—'; tr.appendChild(td);
  });
  tr.appendChild(document.createElement('td'));
  const tdT=document.createElement('td'); tdT.id='ca_total'; tdT.style.cssText='font-size:12px;color:#5070a0;padding:6px 8px;';
  const ov=classOverallAvg(),sc=studentCount(),wc=warnCount();
  tdT.innerHTML=(ov!==null?`全体平均 ${ov.toFixed(1)}点`:'—')+`<br>入力 ${sc}人`+(wc>0?` <span style="color:#d4321f">/ 50点以下 ${wc}件</span>`:'');
  tr.appendChild(tdT); tb.appendChild(tr);
}

function refreshAvgRow(){
  cols.forEach((c,ci)=>{const td=document.getElementById(`ca_${ci}`);if(td){const avg=colAvg(ci);td.textContent=avg!==null?avg.toFixed(1)+'点':'—';}});
  const td=document.getElementById('ca_total');
  if(td){const ov=classOverallAvg(),sc=studentCount(),wc=warnCount();td.innerHTML=(ov!==null?`全体平均 ${ov.toFixed(1)}点`:'—')+`<br>入力 ${sc}人`+(wc>0?` <span style="color:#d4321f">/ 50点以下 ${wc}件</span>`:'');}
}

function updateResultRow(ri){
  let total=0; scores[ri].forEach(v=>{const n=parseInt(v);if(!isNaN(n))total+=n;});
  const hasAny=scores[ri].some(v=>v!=='');
  const p=document.getElementById(`pts_${ri}`); if(p) p.textContent=hasAny?`${total}点`:'';
  const l=document.getElementById(`lv_${ri}`);  if(l) l.textContent=hasAny?`Lv ${getLevel(total)}`:'';
  const pa=document.getElementById(`pa_${ri}`);
  if(pa){const d=pa.querySelector('.pavg')||pa;const avg=studentAvg(ri);d.textContent=avg!==null?avg.toFixed(1):'—';}
}

function updateStars(ri){
  const wrap=document.querySelector(`#res_${ri} .stars-wrap`);
  if(!wrap) return;
  wrap.querySelectorAll('.star').forEach((sp,i)=>{sp.className='star'+(starsData[ri]>=i+1?' lit':'');});
}

let resetType='';
function confirmReset(type){
  resetType=type;
  const msgs={name:['本当に名前リセットしてもよいですか？','全データが消去されます。'],score:['本当に得点リセットしてもよいですか？','全得点データが消去されます。']};
  document.getElementById('modalMsg').textContent=msgs[type][0];
  document.getElementById('modalSub').textContent=msgs[type][1];
  document.getElementById('modalOverlay').classList.add('active');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('active');}
function doReset(){
  if(resetType==='name'){names=Array(ROWS).fill('');cols=['テスト1'];scores=Array(ROWS).fill(null).map(()=>['']);starsData=Array(ROWS).fill(0);}
  else{cols=['テスト1'];scores=Array(ROWS).fill(null).map(()=>['']);}
  closeModal();save();renderRoster();renderScore();
}

// ボタンにイベントを登録
document.getElementById('tabBtnRoster').addEventListener('click', ()=>switchTab('roster'));
document.getElementById('tabBtnScore').addEventListener('click',  ()=>switchTab('score'));
document.querySelector('[data-action="applyRoster"]').addEventListener('click', applyRoster);
document.querySelector('[data-action="resetName"]').addEventListener('click',  ()=>confirmReset('name'));
document.querySelector('[data-action="resetScore"]').addEventListener('click', ()=>confirmReset('score'));
document.querySelector('[data-action="doReset"]').addEventListener('click',    doReset);
document.querySelector('[data-action="closeModal"]').addEventListener('click', closeModal);

setIndicator('loading');
</script>
</body>
