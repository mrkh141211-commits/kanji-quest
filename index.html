<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漢字クエスト</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: #eef3fb;
    min-height: 100vh;
  }

  /* ===== HERO（アップロード画像使用） ===== */
  .hero {
    position: relative;
    overflow: hidden;
    border-bottom: 4px solid #c8860a;
  }
  .hero-img {
    width: 100%;
    height: 240px;
    object-fit: cover;
    display: block;
    filter: brightness(1.05) saturate(1.05);
  }
  .hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(10,20,50,.15) 0%, rgba(10,20,50,.05) 40%, rgba(10,20,50,.35) 100%);
  }
  .title-plate {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    z-index: 5; text-align: center; padding: 14px 36px;
  }
  .title-plate h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 3.4rem; font-weight: 900;
    letter-spacing: 8px;
    background: linear-gradient(180deg, #fff6c8 0%, #ffd34d 35%, #c8860a 55%, #ffd34d 75%, #8a5a00 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(2px 3px 0 #1a1030) drop-shadow(-1px -1px 0 #1a1030) drop-shadow(0 0 16px rgba(255,200,80,.7));
    line-height: 1.15;
  }
  .title-plate .hero-sub {
    margin-top: 6px; font-size: 12px; letter-spacing: 4px;
    color: #fff6d8;
    text-shadow: 1px 1px 3px #1a1030, 0 0 10px rgba(255,200,80,.6);
  }

  /* ===== TOOLBAR ===== */
  .topbar {
    position: relative; z-index: 1;
    background: #ffffff; border-bottom: 2px solid #c8d8f0;
    padding: 8px 14px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .btn {
    border: 1px solid transparent; border-radius: 4px; padding: 6px 16px;
    font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .15s;
  }
  .btn:active { transform: scale(.97); }
  .btn-danger {
    background: linear-gradient(135deg,#c0392b,#9b1a1a);
    color:#fff; border-color:#e05c5c;
    text-shadow: 0 1px 3px rgba(0,0,0,.3);
  }
  .btn-danger:hover { background: linear-gradient(135deg,#d44,#a02020); }
  .btn-save {
    background: linear-gradient(135deg,#1a7a4a,#2a9a5a);
    color:#fff; border-color:#4ad080;
    text-shadow: 0 1px 3px rgba(0,0,0,.3);
  }
  .btn-save:hover { background: linear-gradient(135deg,#2a8a5a,#3aba6a); }
  .topbar-note { font-size: 12px; color: #4a6090; margin-left: 6px; }
  .save-indicator {
    font-size: 12px; color: #4a6090; margin-left: auto; font-weight: 700;
  }
  .save-indicator.saved { color: #1a9a4a; }
  .save-indicator.saving { color: #c0780a; }
  .save-indicator.error { color: #d4321f; }

  /* ===== TABLE ===== */
  .table-area { padding: 14px; overflow-x: auto; position: relative; z-index: 1; }
  table {
    border-collapse: collapse; font-size: 13px;
    background: #fff;
    border: 2px solid #4a78c8; border-radius: 6px; overflow: hidden;
    box-shadow: 0 4px 24px rgba(60,100,200,.18);
  }
  thead tr { background: linear-gradient(135deg, #1a3a8a, #2a5ac0); }
  thead th {
    padding: 9px 8px; color: #fff; font-weight: 700;
    border: 1px solid #1a3a8a; white-space: nowrap; text-align: center;
    text-shadow: 0 1px 3px rgba(0,0,30,.4);
    font-family: 'Noto Serif JP', serif; font-size: 12px;
    letter-spacing: 1px;
  }
  thead th.name-th  { text-align: left; min-width: 150px; width: 155px; }
  thead th.total-th { min-width: 170px; }
  thead th.avg-th   { min-width: 72px; }

  .avg-row td { background: #eaf1ff !important; border-top: 2px solid #4a78c8; }
  .avg-row .avg-label { font-weight: 700; color: #1a3a8a; font-size: 12px; padding: 6px 8px; text-align: left; }
  .avg-row .avg-val   { font-weight: 700; color: #1a4aaa; font-size: 13px; padding: 6px 4px; }

  tbody tr { border-bottom: 1px solid #d8e4f8; }
  tbody tr:not(.avg-row):nth-child(even) { background: #f4f8ff; }
  tbody tr:not(.avg-row):hover { background: #e6f0ff; }

  td { border: 1px solid #d0e0f8; text-align: center; padding: 0; vertical-align: middle; }
  td.name-td { text-align: left; padding: 0; }

  .name-wrap { display: flex; align-items: center; padding: 0 6px; gap: 4px; }
  .row-num { font-size: 11px; color: #5070b0; font-weight: 700; min-width: 22px; text-align: right; flex-shrink: 0; }
  .name-input {
    border: none; background: transparent; font-size: 14px; font-weight: 700; color: #16284f;
    width: 100%; padding: 7px 4px;
  }
  .name-input:focus { outline: none; background: #eaf1ff; border-radius: 3px; }
  .name-input::placeholder { color: #aac0e8; font-weight: 400; }

  .score-input {
    border: none; background: transparent; width: 100%; text-align: center;
    font-size: 14px; color: #16284f; padding: 7px 4px; display: block; font-weight: 600;
  }
  .score-input:focus { outline: none; background: #eaf1ff; }
  .score-input.warn { color: #d4321f !important; font-weight: 900; }

  td.result-td { padding: 5px 10px; white-space: nowrap; font-weight: 900; font-size: 13px; min-width: 170px; }
  .result-pts {
    font-size: 21px; font-weight: 900; color: #c0780a;
    font-family: 'Noto Serif JP', serif;
    text-shadow: 0 1px 2px rgba(180,120,0,.25);
    letter-spacing: 1px; line-height: 1.1;
  }
  .result-lv { color: #2a5ac0; font-size: 13px; margin-top: 3px; font-weight: 700; }

  .stars-wrap { display: flex; justify-content: center; gap: 2px; margin-top: 4px; }
  .star { font-size: 14px; cursor: pointer; color: #c8d8f0; transition: color .12s, transform .1s; user-select: none; line-height: 1; }
  .star.lit { color: #f0a800; text-shadow: 0 0 6px rgba(240,168,0,.5); }
  .star:hover { transform: scale(1.35); }

  .date-input {
    border: none; background: transparent; font-size: 12px; font-weight: 700; color: #fff;
    width: 68px; text-align: center; padding: 2px; font-family: 'Noto Serif JP', serif;
  }
  .date-input:focus { outline: none; background: rgba(255,255,255,.2); border-radius: 3px; }

  td .pavg { font-size: 13px; color: #2a5ac0; font-weight: 700; padding: 6px 4px; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #fff;
    border: 2px solid #4a78c8; border-radius: 10px; padding: 28px 32px; min-width: 280px;
    box-shadow: 0 8px 32px rgba(40,80,180,.25); text-align: center;
  }
  .modal p { font-size: 14px; color: #16284f; margin-bottom: 6px; font-family: 'Noto Serif JP', serif; }
  .modal .modal-sub { font-size: 12px; color: #d4321f; margin-bottom: 20px; }
  .modal-btns { display: flex; gap: 12px; justify-content: center; }
  .btn-ok     { background: linear-gradient(135deg,#1a4aaa,#2a6adc); color:#fff; border-color:#4a90d9; }
  .btn-cancel { background: #e0e0e0; color: #444; border-color: #ccc; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #e4ecf8; }
  ::-webkit-scrollbar-thumb { background: #4a78c8; border-radius: 4px; }
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzKQS778ZclsWFixdCDENM3DHx2DjVsPE",
  authDomain: "seichou-note.firebaseapp.com",
  databaseURL: "https://seichou-note-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "seichou-note",
  storageBucket: "seichou-note.firebasestorage.app",
  messagingSenderId: "449292901706",
  appId: "1:449292901706:web:9d191612e4ba4f4cd235b3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
// 漢字クエスト専用のパス（成長ノートのデータとは混ざりません）
const dataRef = ref(db, 'kanjiQuest/data');

const ROWS=30, MAX_STARS=5, MAX_SCORE=9999, WARN=50;

let names     = Array(ROWS).fill('');
let cols      = ['テスト1'];
let scores    = Array(ROWS).fill(null).map(()=>['']);
let starsData = Array(ROWS).fill(0);

let isLoaded = false;       // 初回読み込みが終わったか
let isRemoteUpdate = false; // 今のonValueが「自分のsetによるもの」かどうかの簡易フラグ
let saveTimer = null;

function normalize(){
  if (!names || !names.length) names = Array(ROWS).fill('');
  if (!cols || !cols.length) cols = ['テスト1'];
  if (!scores || !scores.length) scores = Array(ROWS).fill(null).map(()=>['']);
  if (!starsData || !starsData.length) starsData = Array(ROWS).fill(0);
  while(names.length<ROWS)names.push('');
  while(scores.length<ROWS)scores.push(Array(cols.length).fill(''));
  while(starsData.length<ROWS)starsData.push(0);
  scores.forEach(row=>{while(row.length<cols.length)row.push('');});
}

function setIndicator(state){
  const ind = document.getElementById('saveIndicator');
  ind.classList.remove('saved','saving','error');
  if (state === 'loading') { ind.textContent = '読み込み中…'; }
  if (state === 'saving')  { ind.textContent = '保存中…'; ind.classList.add('saving'); }
  if (state === 'saved')   { ind.textContent = '✔ クラウドに保存済み（全端末で共有）'; ind.classList.add('saved'); }
  if (state === 'error')   { ind.textContent = '⚠ 保存に失敗しました（通信を確認してください）'; ind.classList.add('error'); }
}

// Firebaseからのリアルタイム読み込み（職員室PC・自宅PCどちらで変更しても自動反映）
onValue(dataRef, (snapshot) => {
  const data = snapshot.val();
  if (data) {
    names = data.names || Array(ROWS).fill('');
    cols = data.cols || ['テスト1'];
    scores = data.scores || Array(ROWS).fill(null).map(()=>['']);
    starsData = data.stars || Array(ROWS).fill(0);
  }
  normalize();
  isLoaded = true;
  setIndicator('saved');
  render();
}, (error) => {
  console.error('Firebase読み込みエラー', error);
  setIndicator('error');
});

function save(){
  if (!isLoaded) return; // 初回読み込み前に上書きしてしまうのを防ぐ
  setIndicator('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    set(dataRef, { names, cols, scores, stars: starsData })
      .then(() => setIndicator('saved'))
      .catch((e) => { console.error('保存エラー', e); setIndicator('error'); });
  }, 400);
}


function getLevel(t){return Math.floor(t/100)+1;}
function colAvg(ci){const v=scores.map(r=>r[ci]).filter(x=>x!=='').map(Number);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;}
function studentAvg(ri){const v=scores[ri].filter(x=>x!=='').map(Number);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;}
function classOverallAvg(){const a=[];scores.forEach(r=>r.forEach(v=>{if(v!=='')a.push(Number(v));}));return a.length?a.reduce((a,b)=>a+b,0)/a.length:null;}
function warnCount(){let n=0;scores.forEach(r=>r.forEach(v=>{if(v!==''&&Number(v)<=WARN)n++;}));return n;}
function studentCount(){return scores.filter(r=>r.some(v=>v!=='')).length;}

function autoAddCol(){
  const last=cols.length-1;
  if(scores.some(r=>r[last]!=='')){
    cols.push('テスト'+(cols.length+1));
    scores.forEach(r=>r.push(''));
    save();render();
  }
}
function focusCell(ri,ci){if(ri>=ROWS)return;const el=document.getElementById(`cell_${ri}_${ci}`);if(el){el.focus();try{el.select();}catch(e){}}}

function render(){
  const headerRow=document.getElementById('headerRow');
  const tbody=document.getElementById('tbody');
  headerRow.innerHTML='';

  const thName=document.createElement('th');thName.className='name-th';thName.textContent='生徒名';headerRow.appendChild(thName);
  cols.forEach((c,ci)=>{
    const th=document.createElement('th');
    const inp=document.createElement('input');inp.className='date-input';inp.value=c;
    inp.addEventListener('change',()=>{cols[ci]=inp.value||cols[ci];save();});
    th.appendChild(inp);headerRow.appendChild(th);
  });
  const thAvg=document.createElement('th');thAvg.className='avg-th';thAvg.textContent='個人平均';headerRow.appendChild(thAvg);
  const thTotal=document.createElement('th');thTotal.className='total-th';thTotal.textContent='合計／レベル／☆';headerRow.appendChild(thTotal);

  tbody.innerHTML='';
  for(let ri=0;ri<ROWS;ri++){
    const tr=document.createElement('tr');
    const tdName=document.createElement('td');tdName.className='name-td';
    const wrap=document.createElement('div');wrap.className='name-wrap';
    const num=document.createElement('span');num.className='row-num';num.textContent=(ri+1)+'.';
    const ni=document.createElement('input');ni.className='name-input';ni.type='text';ni.placeholder='氏名';ni.value=names[ri];ni.id=`cell_${ri}_0`;
    ni.addEventListener('change',()=>{names[ri]=ni.value;save();});
    ni.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();focusCell(ri+1,0);}});
    wrap.appendChild(num);wrap.appendChild(ni);tdName.appendChild(wrap);tr.appendChild(tdName);

    let total=0;
    cols.forEach((c,ci)=>{
      const td=document.createElement('td');
      const inp=document.createElement('input');inp.className='score-input';inp.type='number';inp.min=0;inp.max=MAX_SCORE;
      inp.value=scores[ri][ci];inp.id=`cell_${ri}_${ci+1}`;
      if(scores[ri][ci]!==''&&Number(scores[ri][ci])<=WARN)inp.classList.add('warn');
      inp.addEventListener('change',()=>{
        const raw=inp.value.trim();
        scores[ri][ci]=raw===''?'':Math.min(MAX_SCORE,Math.max(0,parseInt(raw)||0));
        if(scores[ri][ci]!=='')inp.value=scores[ri][ci];
        inp.classList.toggle('warn',scores[ri][ci]!==''&&Number(scores[ri][ci])<=WARN);
        save();autoAddCol();updateResultRow(ri);refreshAvgRow();
      });
      inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();focusCell(ri+1,ci+1);}});
      td.appendChild(inp);tr.appendChild(td);
      const n=parseInt(scores[ri][ci]);if(!isNaN(n))total+=n;
    });

    const tdPA=document.createElement('td');tdPA.id=`pavg_${ri}`;
    const paDiv=document.createElement('div');paDiv.className='pavg';
    const pa=studentAvg(ri);paDiv.textContent=pa!==null?pa.toFixed(1):'—';
    tdPA.appendChild(paDiv);tr.appendChild(tdPA);

    const tdR=document.createElement('td');tdR.className='result-td';tdR.id=`result_${ri}`;
    const hasAny=scores[ri].some(v=>v!=='');
    const lv=getLevel(total);
    const ptsDiv=document.createElement('div');ptsDiv.className='result-pts';ptsDiv.id=`pts_${ri}`;
    ptsDiv.textContent=hasAny?`${total} 点`:'';
    const lvDiv=document.createElement('div');lvDiv.className='result-lv';lvDiv.id=`lv_${ri}`;
    lvDiv.textContent=hasAny?`Lv ${lv}`:'';
    const sw=document.createElement('div');sw.className='stars-wrap';
    for(let s=1;s<=MAX_STARS;s++){
      const sp=document.createElement('span');sp.className='star'+(starsData[ri]>=s?' lit':'');sp.textContent='★';
      sp.addEventListener('click',()=>{starsData[ri]=starsData[ri]===s?s-1:s;save();updateStars(ri);});
      sw.appendChild(sp);
    }
    tdR.appendChild(ptsDiv);tdR.appendChild(lvDiv);tdR.appendChild(sw);tr.appendChild(tdR);
    tbody.appendChild(tr);
  }
  appendAvgRow(tbody);
}

function appendAvgRow(tbody){
  const tr=document.createElement('tr');tr.className='avg-row';tr.id='avg-row';
  const lbl=document.createElement('td');lbl.className='avg-label';lbl.textContent='📊 テスト平均';tr.appendChild(lbl);
  cols.forEach((c,ci)=>{
    const td=document.createElement('td');td.className='avg-val';td.id=`cavg_${ci}`;
    const avg=colAvg(ci);td.textContent=avg!==null?avg.toFixed(1)+'点':'—';tr.appendChild(td);
  });
  tr.appendChild(document.createElement('td'));
  const tdTotal=document.createElement('td');tdTotal.className='avg-val';tdTotal.id='cavg_total';
  const overall=classOverallAvg();const sc=studentCount();const wc=warnCount();
  tdTotal.innerHTML=(overall!==null?`全体平均: ${overall.toFixed(1)}点`:'—')+
    `<br><span style="font-size:11px;color:#3a5aa0;">入力: ${sc}人</span>`+
    (wc>0?`<span style="font-size:11px;color:#d4321f;margin-left:6px;">⚠${wc}件</span>`:'');
  tr.appendChild(tdTotal);
  tbody.appendChild(tr);
}

function refreshAvgRow(){
  cols.forEach((c,ci)=>{const td=document.getElementById(`cavg_${ci}`);if(td){const avg=colAvg(ci);td.textContent=avg!==null?avg.toFixed(1)+'点':'—';}});
  const td=document.getElementById('cavg_total');
  if(td){
    const overall=classOverallAvg();const sc=studentCount();const wc=warnCount();
    td.innerHTML=(overall!==null?`全体平均: ${overall.toFixed(1)}点`:'—')+
      `<br><span style="font-size:11px;color:#3a5aa0;">入力: ${sc}人</span>`+
      (wc>0?`<span style="font-size:11px;color:#d4321f;margin-left:6px;">⚠${wc}件</span>`:'');
  }
}

function updateResultRow(ri){
  let total=0;scores[ri].forEach(v=>{const n=parseInt(v);if(!isNaN(n))total+=n;});
  const hasAny=scores[ri].some(v=>v!=='');
  const p=document.getElementById(`pts_${ri}`);const l=document.getElementById(`lv_${ri}`);
  if(p)p.textContent=hasAny?`${total} 点`:'';
  if(l)l.textContent=hasAny?`Lv ${getLevel(total)}`:'';
  const pa=document.getElementById(`pavg_${ri}`);
  const avg=studentAvg(ri);
  if(pa){const d=pa.querySelector('.pavg')||pa;d.textContent=avg!==null?avg.toFixed(1):'—';}
}

function updateStars(ri){
  const wrap=document.querySelector(`#result_${ri} .stars-wrap`);
  if(!wrap)return;
  wrap.querySelectorAll('.star').forEach((sp,i)=>{sp.className='star'+(starsData[ri]>=i+1?' lit':'');});
}

let resetType='';
function confirmReset(type){
  resetType=type;
  const msgs={name:['本当に名前リセットしてもよいですか？','全データが消去されます。'],score:['本当に得点リセットしてもよいですか？','全得点データが消去されます。']};
  document.getElementById('modalMsg').textContent=msgs[type][0];
  document.getElementById('modalSub').textContent=msgs[type][1];
  document.getElementById('modalOverlay').classList.add('active');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('active');}
function doReset(){
  if(resetType==='name'){names=Array(ROWS).fill('');cols=['テスト1'];scores=Array(ROWS).fill(null).map(()=>['']);starsData=Array(ROWS).fill(0);}
  else{cols=['テスト1'];scores=Array(ROWS).fill(null).map(()=>['']);}
  closeModal();save();render();
}

window.confirmReset = confirmReset;
window.closeModal = closeModal;
window.doReset = doReset;

setIndicator('loading');
</script>

</body>
</html>
